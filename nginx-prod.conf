# =========================================================
# api.grupodisal.com.ar — HTTP (Cloudflare Flexible: sin redirect)
# =========================================================
server {
    listen 80;
    server_name api.grupodisal.com.ar;
    client_max_body_size 50M;
    location = /health {
        limit_req  zone=api_health burst=20 nodelay;
        limit_conn api_conn 30;
        proxy_pass http://api-disal:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $api_client_ip;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
    }
    location = /label/add-code {
        limit_req  zone=api_add_code burst=5 nodelay;
        limit_conn api_conn 20;
        proxy_pass http://api-disal:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $api_client_ip;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout  60s;
    }
    location / {
        limit_req  zone=api_default burst=15 nodelay;
        limit_conn api_conn 30;
        proxy_pass http://api-disal:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $api_client_ip;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout  60s;
    }
}
