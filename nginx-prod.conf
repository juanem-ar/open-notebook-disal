# =========================================================
# Rate limit global
# =========================================================
map $http_cf_connecting_ip $api_client_ip {
    default $http_cf_connecting_ip;
    ""      $remote_addr;
}
# Zonas de rate-limit
limit_req_zone  $api_client_ip zone=api_add_code:10m rate=10r/m;
limit_req_zone  $api_client_ip zone=api_health:10m   rate=120r/m;
limit_req_zone  $api_client_ip zone=api_default:10m  rate=60r/m;
limit_conn_zone $api_client_ip zone=api_conn:10m;
# Status al exceder limite
limit_req_status 429;
limit_conn_status 429;
# =========================================================
# automate.grupodisal.com.ar — HTTP
# =========================================================
server {
    listen 80;
    server_name automate.grupodisal.com.ar;
    client_max_body_size 50M;
    location = /n8n {
        return 301 /n8n/;
    }
    # Corrige /n8n/n8n/...
    location ^~ /n8n/n8n/ {
        rewrite ^/n8n/n8n/(.*)$ /n8n/$1 permanent;
    }
    # Corrige assets sin slash
    location ^~ /n8nassets/ {
        rewrite ^/n8nassets/(.*)$ /n8n/assets/$1 break;
        proxy_pass http://n8n:5678;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location ^~ /n8nstatic/ {
        rewrite ^/n8nstatic/(.*)$ /n8n/static/$1 break;
        proxy_pass http://n8n:5678;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    # n8n editor (NO strip de /n8n)
    location ^~ /n8n/ {
        proxy_pass http://n8n:5678/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Scheme          $scheme;
        proxy_set_header X-Forwarded-Prefix /n8n;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout  60s;
        proxy_buffering off;
    }
    # API/Webhooks en raiz
    location ~ ^/(rest|projects|webhook|webhook-test|webhook-waiting|form|form-test|form-waiting|healthz|metrics|api) {
        proxy_pass http://n8n:5678;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Scheme          $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout  60s;
        proxy_buffering off;
    }
    # -- Open Notebook --------------------------------------
    # Archivos estáticos: el browser los pide en la raiz del dominio,
    # pero viven en open_notebook bajo /notebook/
    location = /favicon.ico {
        proxy_pass http://open_notebook:8502/notebook/favicon.ico;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }
    location = /favicon.png {
        proxy_pass http://open_notebook:8502/notebook/favicon.png;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }
    location = /logo.svg {
        proxy_pass http://open_notebook:8502/notebook/logo.svg;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Content-Type "image/svg+xml";
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }
    # /config: endpoint de runtime-config de Next.js.
    location = /config {
        proxy_pass http://open_notebook:8502/notebook/config;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_read_timeout 30s;
    }
    location ^~ /notebook {
        proxy_pass http://open_notebook:8502/notebook;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Prefix /notebook;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout  60s;
        proxy_buffering off;
    }
    # ------------------------------------------------------
    # -- Prode Mundial 2026: redirect al nuevo dominio ----
    location = /prode {
        return 301 https://prode.grupodisal.com.ar/;
    }
    location ^~ /prode/ {
        rewrite ^/prode/(.*)$ https://prode.grupodisal.com.ar/$1 permanent;
    }
    location ^~ /prode-api/ {
        rewrite ^/prode-api/(.*)$ https://prode.grupodisal.com.ar/api/$1 permanent;
    }
    # ----------------------------------------------------
    location / {
        proxy_pass http://wrapper:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 300s;
    }
}
