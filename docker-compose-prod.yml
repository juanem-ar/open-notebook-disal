version: "3.9"

networks:
  n8n_net:
    name: n8n_n8n-net

# ── Servicios del servidor de producción ───────────────────────────────────────

services:
  postgres:
    image: postgres:16
    container_name: n8n-postgres-1
    restart: unless-stopped
    environment:
    volumes:
      - /opt/n8n/postgres:/var/lib/postgresql/data
    networks:
      - n8n_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d n8n"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  api-disal:
    image: juanemar/api-disal:latest
    container_name: api-disal
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: ${POSTGRES_HOST}
      DB_PORT: ${POSTGRES_PORT}
      DB_NAME: ${API_DB_NAME}
      DB_USER: ${API_DB_USER}
      DB_PASSWORD: ${API_DB_PASSWORD}
      DATABASE_URL: ${API_DATABASE_URL}
    networks:
      - n8n_net

  prode-disal:
    image: juanemar/prode-disal:latest
    container_name: prode-disal
    restart: unless-stopped
    networks:
      - n8n_net

  prode-backend:
    image: juanemar/prode-backend:latest
    container_name: prode-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
    ports:
      - "3001:3001"
    networks:
      - n8n_net

  n8n:
    build:
      context: .
      dockerfile: Dockerfile.yml
    image: n8n-oracle:latest
    container_name: n8n-n8n-1
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      open_notebook:
        condition: service_started
    environment:
      N8N_SMTP_SSL: "false"
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      NODE_OPTIONS: "--max-old-space-size=4096"
      N8N_PAYLOAD_SIZE_MAX: "256"
      NODE_ORACLEDB_DRIVER_MODE: "thick"
      LD_LIBRARY_PATH: "/opt/oracle/instantclient_19_19:/usr/lib"
    volumes:
      - /home/node/.n8n:/home/node/.n8n
      - /files/watch:/files:Z
      - /opt/n8n/files/watch:/dw:Z
    ports:
      - "5678:5678"
    networks:
      - n8n_net
    env_file:
      - .env

  vector-storage:
    image: ankane/pgvector:v0.5.1
    container_name: n8n-vector-storage-1
    restart: unless-stopped
    volumes:
      - /opt/n8n/postgres_vector:/var/lib/postgresql_vector/data
    networks:
      - n8n_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d n8n"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "5433:5432"

  proxy:
    image: nginx:alpine
    container_name: n8n-proxy-1
    restart: unless-stopped
    depends_on:
      - n8n
      - wrapper
    volumes:
      - /opt/n8n/nginx/n8n.conf:/etc/nginx/conf.d/default.conf:ro
      - /opt/n8n/certs:/etc/nginx/certs:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - n8n_net

# ── Open Notebook (Disal) ───────────────────────────────────────────────────────
# La imagen se publica en juanemar/disal_notebook:latest.
# n8n la llama internamente como http://open_notebook:5055
# (misma red n8n_net, sin pasar por internet).

  surrealdb:
    image: surrealdb/surrealdb:v2
    container_name: surrealdb
    command: start --log info --user root --pass root rocksdb:/mydata/mydatabase.db
    user: root
    environment:
      - SURREAL_EXPERIMENTAL_GRAPHQL=true
    volumes:
      - /opt/open_notebook/surreal_data:/mydata
    networks:
      - n8n_net
    restart: always
    pull_policy: always

  open_notebook:
    image: juanemar/disal_notebook:latest
    container_name: open_notebook
    pull_policy: always
    ports:
      - "5055:5055"   # REST API  (n8n → http://open_notebook:5055/api/...)
      - "8502:8502"   # Web UI    (acceso directo al portal)
    env_file:
      - .env
    environment:
      - SURREAL_URL=ws://surrealdb:8000/rpc
      - SURREAL_USER=root
      - SURREAL_PASSWORD=root
      - SURREAL_NAMESPACE=open_notebook
      - SURREAL_DATABASE=open_notebook
      # Subpath deployment: el browser llama /config → obtiene apiUrl=/notebook
      # → todas las llamadas van a /notebook/api/* → nginx → Next.js → FastAPI
      - API_URL=/notebook
    volumes:
      - /opt/open_notebook/notebook_data:/app/data
    depends_on:
      - surrealdb
    networks:
      - n8n_net
    restart: always

volumes:
  wrapper_node_modules:
